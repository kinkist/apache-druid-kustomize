apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: druid-coordinators
spec:
  serviceName: druid-coordinators
  replicas: 1
  selector:
    matchLabels:
      app: druid
      nodeType: coordinator
  template:
    metadata:
      labels:
        app: druid
        nodeType: coordinator
      annotations:
        druid.k8s.enablePatching: "true"
    spec:
      serviceAccountName: druid-cluster
      securityContext:
        fsGroup: 1000
        runAsUser: 1000
        runAsGroup: 1000
      containers:
        - name: druid-coordinators
          image: apache/druid:37.0.0
          command: ["/druid.sh", "coordinator"]
          env:
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: POD_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP
            - name: druid_host
              value: "$(POD_IP)"
          ports:
            - name: druid-port
              containerPort: 8081
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: 1
              memory: 1Gi
          livenessProbe:
            httpGet:
              path: /status/health
              port: 8081
            initialDelaySeconds: 180
            periodSeconds: 15
            timeoutSeconds: 60
            failureThreshold: 30
          readinessProbe:
            httpGet:
              path: /status/health
              port: 8081
            initialDelaySeconds: 60
            periodSeconds: 15
            timeoutSeconds: 60
            failureThreshold: 10
          volumeMounts:
            - name: common-config
              mountPath: /opt/druid/conf/druid/cluster/_common
            - name: node-config
              mountPath: /opt/druid/conf/druid/cluster/master/coordinator-overlord
            - name: data
              mountPath: /opt/druid/var
      volumes:
        - name: common-config
          configMap:
            name: druid-common-config
        - name: node-config
          configMap:
            name: druid-coordinator-config
        - name: data
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: druid-coordinators
spec:
  selector:
    app: druid
    nodeType: coordinator
  ports:
    - port: 8081
      targetPort: 8081
