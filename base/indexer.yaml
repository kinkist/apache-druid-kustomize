apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: druid-indexers
spec:
  serviceName: druid-indexers
  replicas: 1
  selector:
    matchLabels:
      app: druid
      nodeType: indexer
  template:
    metadata:
      labels:
        app: druid
        nodeType: indexer
      annotations:
        druid.k8s.enablePatching: "true"
    spec:
      serviceAccountName: druid-cluster
      securityContext:
        fsGroup: 1000
        runAsUser: 1000
        runAsGroup: 1000
      containers:
        - name: druid-indexers
          image: apache/druid
          command: ["/druid.sh", "indexer"]
          env:
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: POD_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP
            - name: druid_host
              value: "$(POD_IP)"
          ports:
            - name: druid-port
              containerPort: 8091
          resources:
            requests:
              cpu: 300m
              memory: 1Gi
            limits:
              cpu: 2
              memory: 2Gi
          livenessProbe:
            httpGet:
              path: /status/health
              port: 8091
            initialDelaySeconds: 120
            periodSeconds: 15
            timeoutSeconds: 30
            failureThreshold: 20
          readinessProbe:
            httpGet:
              path: /status/health
              port: 8091
            initialDelaySeconds: 60
            periodSeconds: 15
            timeoutSeconds: 30
            failureThreshold: 10
          volumeMounts:
            - name: common-config
              mountPath: /opt/druid/conf/druid/cluster/_common
            - name: node-config
              mountPath: /opt/druid/conf/druid/cluster/data/indexer
            - name: data
              mountPath: /opt/druid/var
      volumes:
        - name: common-config
          configMap:
            name: druid-common-config
        - name: node-config
          configMap:
            name: druid-indexer-config
        - name: data
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: druid-indexers
spec:
  selector:
    app: druid
    nodeType: indexer
  ports:
    - port: 8091
      targetPort: 8091
