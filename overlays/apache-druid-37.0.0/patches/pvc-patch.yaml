# PVC size override
# Overrides storage sizes from components/pvc/kustomization.yaml without modifying the component.
#
# accessModes must be specified here — the Strategic Merge Patch replaces the spec sub-object,
# so omitting accessModes would clear the value set by components/pvc.
#
# To use a different StorageClass, add: storageClassName: <name>
#   gp2         — NFS (nfs-subdir-external-provisioner) ← cluster default
#   nfs-client  — NFS (nfs-subdir-external-provisioner)
#   nfs-csi     — NFS (nfs.csi.k8s.io)
#   local-path  — local disk (Rancher local-path-provisioner)
#   longhorn    — distributed block storage (Longhorn)

apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: druid-postgresql
spec:
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 8Gi

