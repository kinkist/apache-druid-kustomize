# Apache Cassandra — overlay-level override of druid-common-config
# Fill in: CASSANDRA_HOST
# ⚠️  Community extension with limited official documentation
# ⚠️  Create the Cassandra keyspace/schema manually before use
# ⚠️  https://github.com/apache/druid/tree/master/extensions-contrib/cassandra-storage
apiVersion: v1
kind: ConfigMap
metadata:
  name: druid-common-config
data:
  common.runtime.properties: |
    # ZooKeeper-less K8s discovery
    druid.zk.service.enabled=false
    druid.discovery.type=k8s
    druid.discovery.k8s.clusterIdentifier=druid-default
    druid.serverview.type=http
    druid.coordinator.loadqueuepeon.type=http
    druid.indexer.runner.type=httpRemote

    # Metadata storage (PostgreSQL)
    druid.metadata.storage.type=postgresql
    druid.metadata.storage.connector.connectURI=jdbc:postgresql://druid-postgresql:5432/druid
    druid.metadata.storage.connector.user=druid
    druid.metadata.storage.connector.password=druid
    druid.metadata.storage.connector.createTables=true

    # Deep storage — Apache Cassandra (Community Extension)
    # ⚠️  Community extension with limited official documentation.
    # ⚠️  You must create the Cassandra keyspace/schema separately before use.
    # ⚠️  https://github.com/apache/druid/tree/master/extensions-contrib/cassandra-storage
    druid.storage.type=c*
    druid.storage.host=<CASSANDRA_HOST>           # e.g. cassandra.default.svc.cluster.local
    druid.storage.keyspace=druid
    druid.storage.archiveOnDelete=true

    # Extensions
    druid.extensions.loadList=["druid-kafka-indexing-service","druid-kubernetes-extensions","postgresql-metadata-storage","druid-datasketches","druid-basic-security","druid-bloom-filter","druid-lookups-cached-global","druid-lookups-cached-single","druid-stats","prometheus-emitter","druid-multi-stage-query","druid-cassandra-storage"]

    # Service discovery
    druid.selectors.indexing.serviceName=druid/overlord
    druid.selectors.coordinator.serviceName=druid/coordinator

    # Indexing logs — Cassandra does not support log storage; using local file
    druid.indexer.logs.type=file
    druid.indexer.logs.directory=/opt/druid/var/druid/indexing-logs

    # SQL
    druid.sql.enable=true
    druid.lookup.enableLookupSyncOnStartup=false

    # Emitter
    druid.emitter=prometheus
    druid.emitter.prometheus.port=9090
    druid.emitter.prometheus.strategy=exporter

    druid.startup.logging.logProperties=true
    druid.k8s.apiClientConfig.watchReconnectLimit=-1
    druid.k8s.apiClientConfig.watchReconnectInterval=1000
