# [Alternative] Inject AWS_REGION env var into all Druid StatefulSets.
#
# druid.s3.endpoint.signingRegion (in the ConfigMap patch) is the preferred approach
# because it is scoped to Druid's S3 client only.
# Use this patch only if you need AWS_REGION set at the OS env level
# (e.g., for other AWS SDK components outside of Druid's S3 client).
#
# MinIO: any non-empty value works — SDK routes via druid.s3.endpoint.url, not region
# AWS S3: must match the region where your bucket lives (e.g. ap-northeast-2)
- op: add
  path: /spec/template/spec/containers/0/env/-
  value:
    name: AWS_REGION
    value: "us-east-1"
