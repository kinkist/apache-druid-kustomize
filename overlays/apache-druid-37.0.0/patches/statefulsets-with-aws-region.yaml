# Inject AWS_REGION env into all Druid StatefulSets
# Required for both S3 and MinIO — newer AWS SDK versions enforce this.
# Enable together with druid-common-config-with-minio.yaml or druid-common-config-with-aws-s3.yaml
#
# MinIO: any non-empty value works — SDK routes via druid.s3.endpoint.url, not region
# AWS S3: must match the region where your bucket lives (e.g. ap-northeast-2)
- op: add
  path: /spec/template/spec/containers/0/env/-
  value:
    name: AWS_REGION
    value: "us-east-1"
